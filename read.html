--- read.html (原始)
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Per Page</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- Font Quran -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Amiri', serif; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col items-center p-2 sm:p-6 min-h-screen">

  <div class="w-full max-w-2xl sm:max-w-3xl bg-white shadow-lg rounded-lg p-3 sm:p-6">
    <h1 class="text-xl sm:text-2xl font-bold text-center mb-4">القرآن الكريم</h1>

    <!-- Kontainer ayat -->
    <div id="quran-page" dir="rtl" class="text-justify text-lg sm:text-2xl leading-relaxed min-h-96 p-2 sm:p-0 touch-auto select-text" style="line-height: 2.5;"></div>

    <!-- Navigasi di tengah -->
    <div class="flex justify-center mt-6 gap-3 sm:gap-6 flex-wrap items-center flex-row-reverse">
      <button id="prev" class="flex items-center justify-center px-4 sm:px-6 py-2 sm:py-3 bg-blue-500 text-white rounded hover:bg-blue-600 active:bg-blue-700 transition min-h-12 min-w-12">
        <span class="material-icons">chevron_right</span>
      </button>
      <div class="text-center text-sm sm:text-base">
        <span id="page-number">1</span> / <span>604</span>
      </div>
      <button id="next" class="flex items-center justify-center px-4 sm:px-6 py-2 sm:py-3 bg-blue-500 text-white rounded hover:bg-blue-600 active:bg-blue-700 transition min-h-12 min-w-12">
        <span class="material-icons">chevron_left</span>
      </button>
    </div>
  </div>

  <script>
    function quranApp() {
      return {
        currentPage: 1,
        currentJuz: 1,
        currentSurahName: 'سورة الفاتحة',
        surahs: [],
        showSurahModal: false,
        showJuzModal: false,
        showPageModal: false,

        async init() {
          // Get page from URL parameter
          const urlParams = new URLSearchParams(window.location.search);
          const pageParam = urlParams.get('page');
          if (pageParam) {
            this.currentPage = parseInt(pageParam);
          }

          // Load surahs list
          try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            this.surahs = data.data;
          } catch (err) {
            console.error(err);
          }

          await this.loadPage(this.currentPage);
        },

        toArabicNumber(num) {
          const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
          return String(num).split('').map(d => arabicDigits[d]).join('');
        },

        async loadPage(page) {
          const res = await fetch(`https://api.alquran.cloud/v1/page/${page}/quran-uthmani`);
          const data = await res.json();
          const ayahs = data.data.ayahs;

          let pageText = "";
          ayahs.forEach(ayah => {
            pageText += ayah.text + " ﴿" + this.toArabicNumber(ayah.numberInSurah) + "﴾";
          });

          document.getElementById("quran-page").textContent = pageText;
          this.currentPage = page;

          // Update localStorage
          localStorage.setItem('lastReadPage', page);

          // Update URL without reload
          window.history.pushState({ page: page }, '', `read.html?page=${page}`);

          // Find current juz and surah
          this.currentJuz = ayahs[0].juz;
          const surahInfo = this.surahs.find(s => s.number === ayahs[0].surah.number);
          if (surahInfo) {
            this.currentSurahName = 'سورة ' + surahInfo.name.replace('سُورَةُ ', '');
          }
        },

        prevPage() {
          if (this.currentPage > 1) {
            this.currentPage--;
            this.loadPage(this.currentPage);
          }
        },

        nextPage() {
          if (this.currentPage < 604) {
            this.currentPage++;
            this.loadPage(this.currentPage);
          }
        },

        async goToSurah(num) {
          try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
            const data = await res.json();
            const page = data.data.ayahs[0].page;
            this.goToPage(page);
          } catch (err) {
            alert('Gagal membuka surah');
          }
        },

        async goToJuz(num) {
          try {
            const res = await fetch(`https://api.alquran.cloud/v1/juz/${num}/quran-uthmani`);
            const data = await res.json();
            const page = data.data.ayahs[0].page;
            this.goToPage(page);
          } catch (err) {
            alert('Gagal membuka juz');
          }
        },

        goToPage(num) {
          this.currentPage = num;
          this.loadPage(num);
        },

        // Touch handling
        touchStartX: 0,
        touchStartY: 0,
        touchEndX: 0,
        touchEndY: 0,

        handleTouchStart(e) {
          this.touchStartX = e.changedTouches[0].clientX;
          this.touchStartY = e.changedTouches[0].clientY;
        },

        handleTouchEnd(e) {
          this.touchEndX = e.changedTouches[0].clientX;
          this.touchEndY = e.changedTouches[0].clientY;
          this.handleSwipe();
        },

        handleSwipe() {
          const swipeThreshold = 50;
          const diffX = this.touchStartX - this.touchEndX;
          const diffY = Math.abs(this.touchStartY - this.touchEndY);

          if (Math.abs(diffX) > swipeThreshold && diffY < swipeThreshold) {
            if (diffX < 0) {
              if (this.currentPage < 604) {
                this.currentPage++;
                this.loadPage(this.currentPage);
              }
            } else {
              if (this.currentPage > 1) {
                this.currentPage--;
                this.loadPage(this.currentPage);
              }
            }
          }
        },

        // Keyboard navigation
        handleKeydown(e) {
          if (e.key === "ArrowLeft") {
            if (this.currentPage < 604) {
              this.currentPage++;
              this.loadPage(this.currentPage);
            }
          } else if (e.key === "ArrowRight") {
            if (this.currentPage > 1) {
              this.currentPage--;
              this.loadPage(this.currentPage);
            }
          }
        }
      }
    }

    // Initialize event listeners
    document.addEventListener('DOMContentLoaded', () => {
      const app = document.querySelector('[x-data]');

      // Touch events
      const pageContainer = document.getElementById("quran-page");
      pageContainer.addEventListener("touchstart", (e) => {
        Alpine.$data(app).handleTouchStart(e);
      }, { passive: true });

      pageContainer.addEventListener("touchend", (e) => {
        Alpine.$data(app).handleTouchEnd(e);
      }, { passive: true });

      // Keyboard events
      document.addEventListener("keydown", (e) => {
        Alpine.$data(app).handleKeydown(e);
      });
    });
  </script>
</body>
</html>
